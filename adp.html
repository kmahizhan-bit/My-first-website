
<!DOCTYPE html>
<html>
<head>
<style> 
body{
margin: 0;
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
font-family: Arial, sans-serif;
background-image: url("https://img.freepik.com/free-vector/futuristic-video-game-controller-background-with-text-space_1017-54730.jpg?semt=ais_hybrid&w=740&q=80");
background-size: cover;
background-position:  center, ;
background-repeat: no-repeat;
}
.container {
background: white;
background-image: url("https://img.freepik.com/free-vector/bird-colorful-gradient-design-vector_343694-2506.jpg?semt=ais_hybrid&w=740&q=80"),url("https://img.freepik.com/free-vector/bird-colorful-gradient-design-vector_343694-2506.jpg?semt=ais_hybrid&w=740&q=80");
background-position: right bottom,left top;
background-size:100px;
background-repeat:no-repeat;
width: 320px;
padding: 50px;
text-align: center;
/* Rounded corners */
border-radius: 25px;
/* Shadow effect */
box-shadow: 3px 3px 5px rgb(132, 0, 255);
}
.container h2 {
margin-bottom: 25px;
text-shadow: 2px 2px rgb(0, 200, 255);
color: #2c3e50;
}
.container img {
width: 100%;
border-radius: 15px;
margin-bottom: 15px;
/* Image shadow */
box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
}
/* PARAGRAPH TEXT */
.container p {
font-size: 14px;
color: #555;
margin-bottom: 20px;
}
.container button {
padding: 10px 20px;
border: none;
border-radius: 25px;
background: rgb(0, 194, 248);
color: white;
font-size: 14px;
cursor: pointer;
/* Button shadow */
box-shadow: 5px 5px rgb(134, 193, 218);
}
</style>
</head>
<body>
 <div class="container">
 <h2>Video game </h2>
 <img src="https://img.freepik.com/free-vector/hand-drawn-retro-gaming-poster-design_23-2150852630.jpg?semt=ais_hybrid&w=740&q=80">
<p> Video games are interactive electronic entertainment played on devices like consoles, PCs, and smartphones, generating visual feedback on a screen</p>
   <button> learn More </button>
   </div>
</body>
</html>
